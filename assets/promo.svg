<svg width="680" height="456" viewBox="0 0 680 456" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Harness Forge promo card</title>
<desc>A Claude Code skill that auto-optimizes the scaffolding around a fixed LLM: propose candidate harnesses, score each with a $0 deterministic test, keep the Pareto-best, and loop. The base model stays frozen. The reference paper's ~1,260-line Python harness becomes ~75 lines. Free to run, no API. github.com/001TMF/harness-forge</desc>
<defs>
<marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#E0875A"/></marker>
</defs>
<rect x="0" y="0" width="680" height="456" rx="18" fill="#0b0b0c"/>
<rect x="1" y="1" width="678" height="454" rx="17" fill="none" stroke="#22232a"/>

<text x="40" y="58" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="24" font-weight="700" letter-spacing="2" fill="#f4f3ef">HARNESS FORGE</text>
<text x="640" y="54" text-anchor="end" font-family="sans-serif" font-size="12" fill="#8b8b85">open source · MIT</text>

<text x="40" y="90" font-family="sans-serif" font-size="15" fill="#d2d2cb">Auto-optimize the memory, retrieval &amp; context around a fixed LLM.</text>
<text x="40" y="112" font-family="sans-serif" font-size="12" fill="#8b8b85">The base model stays frozen — only the harness around it changes.</text>
<line x1="40" y1="126" x2="640" y2="126" stroke="#22232a"/>

<rect x="40" y="148" width="180" height="58" rx="12" fill="#15151c" stroke="#2c2c35"/>
<text x="130" y="174" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#f4f3ef">Propose</text>
<text x="130" y="192" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#9a9a93">candidate harnesses</text>

<rect x="250" y="148" width="180" height="58" rx="12" fill="#15151c" stroke="#2c2c35"/>
<text x="340" y="174" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#f4f3ef">Score</text>
<text x="340" y="192" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#9a9a93">deterministic · <tspan fill="#E0875A" font-weight="700">$0</tspan></text>

<rect x="460" y="148" width="180" height="58" rx="12" fill="#15151c" stroke="#2c2c35"/>
<text x="550" y="174" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#f4f3ef">Keep</text>
<text x="550" y="192" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#9a9a93">the Pareto-best</text>

<line x1="222" y1="177" x2="247" y2="177" stroke="#E0875A" stroke-width="2" marker-end="url(#ar)"/>
<line x1="432" y1="177" x2="457" y2="177" stroke="#E0875A" stroke-width="2" marker-end="url(#ar)"/>
<path d="M550 206 L550 232 L130 232 L130 209" fill="none" stroke="#E0875A" stroke-width="1.6" marker-end="url(#ar)"/>
<rect x="312" y="221" width="56" height="20" rx="10" fill="#0b0b0c"/>
<text x="340" y="235" text-anchor="middle" font-family="sans-serif" font-size="11.5" fill="#E0875A">repeat</text>

<text x="340" y="306" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="46" font-weight="700"><tspan fill="#f4f3ef">1,260</tspan><tspan fill="#6f6f69"> &#8594; </tspan><tspan fill="#E0875A">~75</tspan></text>
<text x="340" y="332" text-anchor="middle" font-family="sans-serif" font-size="12.5" fill="#9a9a93">lines of Python harness  &#8594;  lines of a Claude Code skill</text>
<text x="340" y="350" text-anchor="middle" font-family="sans-serif" font-size="11.5" fill="#6f6f69">(Claude Code is already the agent runtime)</text>

<rect x="150" y="368" width="104" height="26" rx="13" fill="#15151c" stroke="#2c2c35"/>
<text x="202" y="385" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#E0875A">$0 scorer</text>
<rect x="266" y="368" width="96" height="26" rx="13" fill="#15151c" stroke="#2c2c35"/>
<text x="314" y="385" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#d2d2cb">no API key</text>
<rect x="374" y="368" width="156" height="26" rx="13" fill="#15151c" stroke="#2c2c35"/>
<text x="452" y="385" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#d2d2cb">runs on your Claude sub</text>

<text x="340" y="428" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="14" fill="#d2d2cb">github.com/001TMF/harness-forge</text>
</svg>
